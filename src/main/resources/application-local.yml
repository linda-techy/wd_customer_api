# ╔══════════════════════════════════════════════════════════════════╗
# ║  Customer API — LOCAL Profile                                    ║
# ║  🔑 SHARED STORAGE: same path as portal API for cross-app files ║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8081
  error:
    include-message: always
    include-stacktrace: always

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://46.202.164.251:5432/wdTestDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Staygether@2025}
    hikari:
      maximumPoolSize: 5
      minimumIdle: 2
  flyway:
    enabled: true
    # Local dev: use the shared history table so customer migrations (V999+) don't replay on populated DB.
    # Production uses customer_flyway_schema_history (set in application.yml).
    table: flyway_schema_history

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  mail:
    host: smtp.hostinger.com
    port: 465
    username: ${MAIL_USERNAME:info@walldotbuilders.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:6c6f63616c2d637573742d6170692d6a77742d7365637265742d6b65792d6e6f74-for-production-000000000}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# ── Shared storage (SAME path as portal-api local) ──────────────────
file:
  upload-dir: "N:\\Projects\\wd projects git\\storage"
storageBasePath: "N:\\Projects\\wd projects git\\storage"

app:
  email:
    enabled: true
  customer-portal-base-url: http://localhost:3002
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002

logging:
  level:
    root: INFO
    com.wd.custapi: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
