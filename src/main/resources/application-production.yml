# ╔══════════════════════════════════════════════════════════════════╗
# ║  Customer API — PRODUCTION Profile                               ║
# ║  🔑 SHARED STORAGE: same path as portal API for cross-app files ║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8081
  tomcat:
    threads:
      max: 40                        # 1-core VPS shared with portal API: cap Tomcat (default 200)
      min-spare: 4
    accept-count: 50
  error:
    include-message: never
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://46.202.164.251:5432/wdTestDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Staygether@2025}
    hikari:
      maximum-pool-size: 15          # 1-core box shared with portal API + Postgres (was 50)
      minimum-idle: 3                # was 10
      connection-timeout: 30000      # 30s — gives thread time to wait for a free connection
      idle-timeout: 240000           # 4 min (was 10 min)
      max-lifetime: 280000           # ~4.6 min, under infra idle-close (was 30 min; fixes "connection has been closed")
      keepalive-time: 120000         # 2 min heartbeat so idle conns don't go stale
      leak-detection-threshold: 60000 # Log if a connection is held > 60s
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  task:
    execution:
      pool:
        core-size: 4                 # 1-core box: was 10
        max-size: 16                 # was 50
        queue-capacity: 500
      thread-name-prefix: async-cust-
    scheduling:
      pool:
        size: 2                      # was 3
  servlet:
    encoding:
      enabled: true

  mail:
    # Host/port/username/SMTP properties live in application.yml (base).
    password: ${MAIL_PASSWORD:Wall.builders2018}

jwt:
  secret: ${JWT_SECRET:6c6f63616c2d6465762d6a77742d7365637265742d6b65792d6e6f742d666f72-production-000000000000}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# ── Shared storage (SAME path as portal-api production) ─────────────
file:
  upload-dir: /home/ftpuser/var/www/app/walldotbuilders/storage
storageBasePath: /home/ftpuser/var/www/app/walldotbuilders/storage

app:
  customer-portal-base-url: https://app.walldotbuilders.com
  cors:
    allowed-origins: https://app.walldotbuilders.com

logging:
  level:
    root: WARN
    com.wd.custapi: INFO
    org.springframework: WARN
    org.hibernate: WARN
