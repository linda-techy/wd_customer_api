# ╔══════════════════════════════════════════════════════════════════╗
# ║  Customer API — PRODUCTION Profile                               ║
# ║  🔑 SHARED STORAGE: same path as portal API for cross-app files ║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8081
  error:
    include-message: never
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50          # Up from 15 — prevents connection starvation at load
      minimum-idle: 10
      connection-timeout: 30000      # 30s — gives thread time to wait for a free connection
      idle-timeout: 600000           # 10 min
      max-lifetime: 1800000          # 30 min — recycles connections before DB drops them
      leak-detection-threshold: 60000 # Log if a connection is held > 60s
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 500
      thread-name-prefix: async-cust-
    scheduling:
      pool:
        size: 3
  servlet:
    encoding:
      enabled: true

  mail:
    # Host/port/username/SMTP properties live in application.yml (base).
    password: ${MAIL_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# ── Shared storage (SAME path as portal-api production) ─────────────
file:
  upload-dir: /home/ftpuser/var/www/app/walldotbuilders/storage
storageBasePath: /home/ftpuser/var/www/app/walldotbuilders/storage

app:
  customer-portal-base-url: https://app.walldotbuilders.com
  cors:
    allowed-origins: https://app.walldotbuilders.com

logging:
  level:
    root: WARN
    com.wd.custapi: INFO
    org.springframework: WARN
    org.hibernate: WARN
