spring:
  application:
    name: cust-api
  flyway:
    table: customer_flyway_schema_history
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    banner-mode: off

  # ── Jackson (global serialization) ─────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connectionTimeout: 10000
      validationTimeout: 5000
      maximumPoolSize: 15   # Prevents DB thread queuing at moderate load
      minimumIdle: 5
      initializationFailTimeout: 20000
      idleTimeout: 300000
      maxLifetime: 1200000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  # ── Mail (full config here — identical across all environments)
  # Host: smtp.hostinger.com:465 uses IMPLICIT SSL (not STARTTLS).
  # starttls.enable MUST be false on port 465 — STARTTLS is for port 587 only.
  # ssl.trust prevents certificate errors on VPS JVMs that lack the Hostinger CA.
  mail:
    host: smtp.hostinger.com
    port: 465
    username: ${MAIL_USERNAME:info@walldotbuilders.com}
    # password: override per profile — never hardcoded here
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.hostinger.com
          starttls:
            enable: false
            required: false
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

jwt:
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  aud:
    value: "customer-api"
    enforce: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:false}
  info:
    title: WD Customer API
    description: Customer-facing API for the WallDot Builders construction portal
    version: 1.0.0

app:
  email:
    enabled: true
  portal:
    webhook-secret: ${PORTAL_WEBHOOK_SECRET:}
    base-url: ${PORTAL_API_BASE_URL:http://localhost:8080}
