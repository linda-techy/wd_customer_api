spring:
  application:
    name: cust-api
  flyway:
    table: customer_flyway_schema_history
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    banner-mode: off

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connectionTimeout: 10000
      validationTimeout: 5000
      maximumPoolSize: 15   # Prevents DB thread queuing at moderate load
      minimumIdle: 5
      initializationFailTimeout: 20000
      idleTimeout: 300000
      maxLifetime: 1200000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: false
            trust: smtp.hostinger.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:false}
  info:
    title: WD Customer API
    description: Customer-facing API for the WallDot Builders construction portal
    version: 1.0.0

app:
  portal:
    webhook-secret: ${PORTAL_WEBHOOK_SECRET:}
    base-url: ${PORTAL_API_BASE_URL:http://localhost:8080}
